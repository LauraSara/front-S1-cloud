<div class="login-page">
  <mat-card class="login-card">
    <div class="login-brand">
      <img src="assets/logo.svg" alt="VitalGuard" />
      <h1>VitalGuard</h1>
      <p>Sistema de alertas médicas en tiempo real</p>
    </div>

    <p class="login-description">
      Monitoreo de signos vitales para pacientes críticos hospitalarios.
      Acceda con su cuenta institucional de Microsoft.
    </p>

    <button mat-flat-button color="primary" class="login-btn" (click)="login()">
      <mat-icon>login</mat-icon>
      Iniciar sesión con Microsoft
    </button>
  </mat-card>
</div>
