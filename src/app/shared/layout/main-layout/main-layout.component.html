<mat-sidenav-container class="layout-container">
  <mat-sidenav mode="side" opened class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <img src="assets/logo.svg" alt="" />
      </div>
      <div class="brand-text">
        <h1>VitalGuard</h1>
        <p>Alertas Médicas</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="nav-item nav-item--logout" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <header class="topbar">
      <span class="topbar-title">Sistema de Alertas Médicas Hospitalarias</span>

      <div class="topbar-actions">
        <div class="user-profile">
          <span class="user-avatar">{{ userInitials }}</span>
          <span class="user-label">{{ userName }}</span>
        </div>
        <span class="topbar-divider" aria-hidden="true"></span>
        <button type="button" class="logout-link" (click)="logout()">Cerrar sesión</button>
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
